name: riaya_app
description: نظام رعاية المسنين

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  permission_handler: ^11.3.1
  url_launcher: ^6.3.2
  pdf: ^3.12.0
  printing: ^5.14.3
  image_picker: ^1.0.7
  flutter_secure_storage: ^10.0.0
  flutter_contacts: 1.1.9
  photo_manager: ^3.9.0
  photo_manager_image_provider: ^2.2.0
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  lottie: ^3.1.0
  flutter_tts: ^4.2.0
  speech_to_text: ^7.3.0
  file_picker: 8.1.7

  # ── Backend Integration ─────────────────────────────────────────────
  http: ^1.2.0

  # ── Audio Playback (للرسائل الصوتية من العائلة) ─────────────────────
  audioplayers: ^6.1.0

  # ── Firebase Push Notifications ─────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  socket_io_client: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/animations/Robot.json
    - assets/animations/management.json
    - assets/animations/Meddone.json
    - assets/icons/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900